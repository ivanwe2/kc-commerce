services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: kctrading
      POSTGRES_PASSWORD: kctrading_dev
      POSTGRES_DB: kctrading
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kctrading"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
